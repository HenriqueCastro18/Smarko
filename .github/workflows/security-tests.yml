name: Code Quality & Security Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run all Django tests
        env:
          DEBUG: False
          SECURE_SSL_REDIRECT: True
        run: |
          python manage.py test Smarko_App.tests --verbosity=2

      - name: Test authentication module
        run: python manage.py test Smarko_App.tests.AuthenticationTests --verbosity=2

      - name: Test utils module
        run: python manage.py test Smarko_App.tests.UtilsTests --verbosity=2

      - name: Test token security
        run: python manage.py test Smarko_App.tests.TokenSecurityTests --verbosity=2

      - name: Test security configuration
        run: python manage.py test Smarko_App.tests.SecurityConfigTests --verbosity=2

      - name: Test LGPD compliance
        run: python manage.py test Smarko_App.tests.LGPDComplianceTests --verbosity=2

      - name: Test views security
        run: python manage.py test Smarko_App.tests.ViewsSecurityTests --verbosity=2

      - name: Test Firebase integration
        run: python manage.py test Smarko_App.tests.FirebaseIntegrationTests --verbosity=2

      - name: Test code quality
        run: python manage.py test Smarko_App.tests.CodeQualityTests --verbosity=2

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install quality tools
        run: |
          pip install flake8 black isort bandit

      - name: Check code formatting with black
        run: |
          black --check Smarko_App/ --line-length=120 || echo "Run: black Smarko_App/ --line-length=120"

      - name: Check imports with isort
        run: |
          isort --check-only Smarko_App/ --profile black || echo "Run: isort Smarko_App/ --profile black"

      - name: Lint with flake8
        run: |
          flake8 Smarko_App/ --max-line-length=120 --exclude=migrations,__pycache__ \
            --ignore=E501,W503,E203 --count --show-source --statistics

      - name: Security check with bandit
        run: |
          bandit -r Smarko_App/ -ll --skip B101,B601 || true

      - name: Check for hardcoded secrets
        run: |
          echo "Checking for hardcoded secrets..."
          grep -r "firebase.*key" Smarko_App/ --include="*.py" || echo "✓ No hardcoded Firebase keys found"
          grep -r "SECRET.*=" Smarko_App/ --include="*.py" | grep -v "settings.py" || echo "✓ No exposed secrets found"

  test-coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt coverage

      - name: Run tests with coverage
        run: |
          coverage run --source='Smarko_App' manage.py test Smarko_App.tests
          coverage report --fail-under=70

      - name: Generate coverage report
        if: always()
        run: |
          coverage html
          echo "Coverage report generated in htmlcov/"

  security-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Run security audit
        run: |
          echo "## Security Audit Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Code Quality Checks" >> $GITHUB_STEP_SUMMARY
          echo "- Type hints validation" >> $GITHUB_STEP_SUMMARY
          echo "- No hardcoded secrets" >> $GITHUB_STEP_SUMMARY
          echo "- Security best practices" >> $GITHUB_STEP_SUMMARY
